<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слайдер</title>
    <link href="./style.css" rel="stylesheet" />
</head>
<body>
    <!-- Основной контейнер слайдера -->
    <div class="slider">
        <!-- Контейнер всех слайдов -->
        <div class="slides">
            <div class="slide">
                <img src="./images/bear.webp" width="300">
                <div class="caption">Изображение 1 из 5</div>
            </div>
            <div class="slide">
                <img src="./images/cat.webp" width="300">
                <div class="caption">Изображение 2 из 5</div>
            </div>
            <div class="slide">
                <img src="./images/enot.webp" width="300">
                <div class="caption">Изображение 3 из 5</div>
            </div>
            <div class="slide">
                <img src="./images/tiger.webp" width="300">
                <div class="caption">Изображение 4 из 5</div>
            </div>
            <div class="slide">
                <img src="./images/wolf.webp" width="300">
                <div class="caption">Изображение 5 из 5</div>
            </div>
        </div>

        <!-- Кнопки управления слайдером -->
        <button class="prev">&#10094;</button> <!-- Кнопка «Назад» -->
        <button class="next">&#10095;</button> <!-- Кнопка «Вперёд» -->
    </div>

    <script src="./script.js"></script>
</body>
</html>
